<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgeScope — AI Age Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0f;
      --surface: #13131a;
      --border: #2a2a38;
      --accent: #e8c97a;
      --accent2: #c45f3c;
      --text: #e8e8f0;
      --muted: #7a7a9a;
      --radius: 4px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,201,122,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,201,122,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(196,95,60,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e8e8f0 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      margin-top: 16px;
      letter-spacing: 0.05em;
    }

    #proxy-banner {
      background: rgba(232,201,122,0.08);
      border: 1px solid rgba(232,201,122,0.3);
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--accent);
      text-align: center;
      letter-spacing: 0.05em;
    }
    #proxy-banner.hidden { display: none; }

    .upload-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      margin: 24px;
      border-radius: var(--radius);
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(232,201,122,0.04);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon { font-size: 40px; margin-bottom: 16px; display: block; }

    .drop-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .drop-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }

    #preview-wrap { display: none; margin: 0 24px 24px; }

    #preview-wrap img {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      border-radius: var(--radius);
      display: block;
      border: 1px solid var(--border);
    }

    .controls { display: flex; gap: 12px; padding: 0 24px 24px; }

    .btn-primary {
      flex: 1;
      background: var(--accent2);
      color: #fff;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 14px 24px;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 14px 20px;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    #results {
      display: none;
      margin-top: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .results-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .results-title { font-size: 11px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; }
    .face-count { font-size: 11px; color: var(--muted); }

    .face-list { padding: 16px 24px; display: flex; flex-direction: column; gap: 12px; }

    .face-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      animation: slideIn 0.4s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .face-number {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      min-width: 50px;
    }

    .face-details { flex: 1; }
    .face-label { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
    .face-age { font-size: 28px; font-family: 'Playfair Display', serif; font-weight: 700; color: var(--text); }
    .face-confidence { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .age-bar-wrap { flex: 1; }
    .age-bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .age-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #loading { display: none; text-align: center; padding: 32px; }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 12px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

    #error-box {
      display: none;
      margin-top: 24px;
      padding: 16px 20px;
      background: rgba(196,95,60,0.1);
      border: 1px solid rgba(196,95,60,0.4);
      border-radius: var(--radius);
      font-size: 13px;
      color: #e87a5a;
      line-height: 1.6;
    }

    .no-faces { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

    footer { margin-top: 56px; text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="eyebrow">Powered by Luxand Vision AI</div>
    <h1>AgeScope</h1>
    <p class="tagline">Upload a photo — detect ages instantly</p>
  </header>

  <div id="proxy-banner">
    ⚠ Replace <code>YOUR_WORKER_URL_HERE</code> in this file with your Cloudflare Worker URL to go live.
  </div>

  <div class="upload-card">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])"/>
      <span class="drop-icon">◈</span>
      <div class="drop-title">Drop an image here</div>
      <div class="drop-sub">or click to browse — JPG, PNG, WEBP</div>
    </div>

    <div id="preview-wrap">
      <img id="preview" src="" alt="Preview"/>
    </div>

    <div class="controls">
      <button class="btn-primary" id="detect-btn" onclick="runDetect()" disabled>Detect Ages</button>
      <button class="btn-ghost" onclick="resetAll()">Clear</button>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Analyzing faces…</div>
  </div>

  <div id="error-box"></div>

  <div id="results">
    <div class="results-header">
      <span class="results-title">Detection Results</span>
      <span class="face-count" id="face-count"></span>
    </div>
    <div class="face-list" id="face-list"></div>
  </div>

  <footer>
    AgeScope &mdash; Built with <a href="https://luxand.cloud/api" target="_blank">Luxand Cloud API</a>
  </footer>
</div>

<script>
  // ─── STEP 1: Paste your Cloudflare Worker URL here ───────────────
  const PROXY_URL = "YOUR_WORKER_URL_HERE";
  // e.g. "https://agescope-proxy.yourname.workers.dev"
  // ─────────────────────────────────────────────────────────────────

  let selectedFile = null;

  window.addEventListener('DOMContentLoaded', () => {
    if (PROXY_URL && PROXY_URL !== "YOUR_WORKER_URL_HERE") {
      document.getElementById('proxy-banner').classList.add('hidden');
    }
  });

  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('preview').src = e.target.result;
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('detect-btn').disabled = false;
    };
    reader.readAsDataURL(file);
    document.getElementById('results').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
  }

  async function runDetect() {
    if (!selectedFile) return;

    if (!PROXY_URL || PROXY_URL === "YOUR_WORKER_URL_HERE") {
      showError("Set your Cloudflare Worker URL in the PROXY_URL variable inside index.html.");
      return;
    }

    setLoading(true);
    hideError();

    try {
      const formData = new FormData();
      formData.append('photo', selectedFile);

      const response = await fetch(PROXY_URL, { method: 'POST', body: formData });
      const data = await response.json();

      if (!response.ok) {
        showError(`API Error ${response.status}: ${data.message || JSON.stringify(data)}`);
        return;
      }

      renderResults(data);
    } catch (err) {
      showError(`Request failed: ${err.message}`);
    } finally {
      setLoading(false);
    }
  }

  function renderResults(data) {
    const faces = Array.isArray(data) ? data : (data.faces || []);
    const resultsEl = document.getElementById('results');
    const faceList  = document.getElementById('face-list');
    const faceCount = document.getElementById('face-count');

    faceList.innerHTML = '';
    resultsEl.style.display = 'block';

    if (!faces.length) {
      faceCount.textContent = '0 faces';
      faceList.innerHTML = '<div class="no-faces">No faces detected in this image.</div>';
      return;
    }

    faceCount.textContent = `${faces.length} face${faces.length > 1 ? 's' : ''} found`;

    faces.forEach((face, i) => {
      const age    = face.age ?? face.attributes?.age ?? '?';
      const ageNum = parseFloat(age);
      const barW   = isNaN(ageNum) ? 0 : Math.min(100, ageNum);

      const card = document.createElement('div');
      card.className = 'face-card';
      card.style.animationDelay = `${i * 80}ms`;
      card.innerHTML = `
        <div class="face-number">#${i + 1}</div>
        <div class="face-details">
          <div class="face-label">Estimated Age</div>
          <div class="face-age">${isNaN(ageNum) ? age : Math.round(ageNum)} yrs</div>
          ${face.probability ? `<div class="face-confidence">Confidence: ${Math.round(face.probability * 100)}%</div>` : ''}
        </div>
        <div class="age-bar-wrap">
          <div class="age-bar-track">
            <div class="age-bar-fill" style="width:0%"></div>
          </div>
        </div>
      `;
      faceList.appendChild(card);
      setTimeout(() => {
        card.querySelector('.age-bar-fill').style.width = barW + '%';
      }, 50 + i * 80);
    });
  }

  function setLoading(on) {
    document.getElementById('loading').style.display = on ? 'block' : 'none';
    document.getElementById('detect-btn').disabled = on;
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() { document.getElementById('error-box').style.display = 'none'; }

  function resetAll() {
    selectedFile = null;
    document.getElementById('file-input').value = '';
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('preview').src = '';
    document.getElementById('detect-btn').disabled = true;
    document.getElementById('results').style.display = 'none';
    hideError();
  }
</script>
</body>
</html>
